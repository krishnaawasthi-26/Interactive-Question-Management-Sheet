spring.application.name=iqms-backend
server.port=8080

spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/iqms}

app.cors.allowed-origins=http://localhost:5173,http://localhost:5174,http://127.0.0.1:5173,http://127.0.0.1:5174,https://interactive-question-management-she-gamma.vercel.app
app.cors.allowed-origin-patterns=http://localhost:*,http://127.0.0.1:*,https://*.vercel.app
app.auth.secret=${APP_AUTH_SECRET:change-me-super-secret-key}
app.auth.expiration-seconds=604800
app.auth.google-client-id=${APP_AUTH_GOOGLE_CLIENT_ID:}
app.auth.google-client-ids=${APP_AUTH_GOOGLE_CLIENT_IDS:}
app.auth.otp-bypass-key=${APP_AUTH_OTP_BYPASS_KEY:}

app.queue.processing-delay-ms=350


spring.mail.host=${APP_MAIL_HOST:}
spring.mail.port=${APP_MAIL_PORT:587}
spring.mail.username=${APP_MAIL_USERNAME:}
spring.mail.password=${APP_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${APP_MAIL_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${APP_MAIL_STARTTLS:true}

app.mail.host=${APP_MAIL_HOST:}
app.mail.port=${APP_MAIL_PORT:587}
app.mail.username=${APP_MAIL_USERNAME:}
app.mail.password=${APP_MAIL_PASSWORD:}
app.mail.from-address=${APP_MAIL_FROM:${APP_MAIL_USERNAME:}}
app.mail.from-name=${APP_MAIL_FROM_NAME:IQMS}
app.mail.auth=${APP_MAIL_AUTH:true}
app.mail.starttls=${APP_MAIL_STARTTLS:true}
app.mail.enabled=${APP_MAIL_ENABLED:false}

app.payment.razorpay.enabled=${APP_PAYMENT_RAZORPAY_ENABLED:false}
app.payment.razorpay.key-id=${RAZORPAY_KEY_ID:}
app.payment.razorpay.key-secret=${RAZORPAY_KEY_SECRET:}

app.revision.intervals-hours=6,24,72,168
