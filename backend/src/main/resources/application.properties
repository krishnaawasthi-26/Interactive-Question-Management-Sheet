spring.application.name=iqms-backend
server.port=8080

spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/iqms}

app.cors.allowed-origins=http://localhost:5173,http://localhost:5174,http://127.0.0.1:5173,http://127.0.0.1:5174,https://interactive-question-management-she-gamma.vercel.app
app.auth.secret=${APP_AUTH_SECRET:change-me-super-secret-key}
app.auth.expiration-seconds=604800

app.queue.processing-delay-ms=350

app.auth.google-client-id=${APP_AUTH_GOOGLE_CLIENT_ID:}

app.payment.razorpay.key-id=${RAZORPAY_KEY_ID:}
app.payment.razorpay.key-secret=${RAZORPAY_KEY_SECRET:}
